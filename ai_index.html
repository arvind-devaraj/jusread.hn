or robust governance frameworks to manage their deployment and impact.\n\nIn the comments, participants generally agree on the necessity of prioritizing safety and ethical considerations in AI development. However, there are debates regarding the effectiveness of current regulatory approaches and the potential for overreach that could stifle innovation. Some commenters express concerns about the pace of AI advancement outstripping the establishment of adequate safety measures.\n\nNotable insights include calls for a collaborative approach among researchers, policymakers, and industry leaders to create comprehensive guidelines that ensure AI technologies benefit society while minimizing risks. There is also a recognition of the importance of transparency and public engagement in shaping the future of AI."}, {"title": "There is minimal downside to switching to open models", "points": 407, "author": "amarble", "num_comments": 330, "probability": 0.847, "url": "https://www.marble.onl/posts/cancel_claude.html", "hn_link": "https://news.ycombinator.com/item?id=48622518", "created_at": "2026-06-21T20:56:01Z", "summary": "The Hacker News discussion centers around the idea that transitioning to open models for AI, particularly large language models (LLMs), has minimal downsides. The original post argues that despite proprietary models often being perceived as superior, open models have caught up significantly and can be a viable alternative for many users.\n\nIn the comments, there is a debate about the practicality of running open models locally versus using hosted services. Some users argue that the cost of hardware for local inference is prohibitive, while others believe that investing in local setups is essential for long-term independence from proprietary services. There is also discussion about the performance of open models compared to proprietary ones, with some commenters suggesting that the perceived superiority of new proprietary models may be exaggerated due to marketing tactics and potential degradation of older models over time.\n\nNotable insights include concerns about the unpredictability of proprietary model performance and the potential risks of relying on them for business applications. Some users express a desire to avoid being \"sharecroppers\" on proprietary platforms, advocating for the ownership of hardware and inference capabilities as a safeguard against future uncertainties. Overall, the conversation reflects a growing interest in open-source AI solutions and the implications of hardware investment in this rapidly evolving field."}, {"title": "Identity verification on Claude", "points": 866, "author": "bathory", "num_comments": 736, "probability": 0.828, "url": "https://support.claude.com/en/articles/14328960-identity-verification-on-claude", "hn_link": "https://news.ycombinator.com/item?id=48618455", "created_at": "2026-06-21T12:44:13Z", "summary": "The Hacker News discussion centers around a post about identity verification requirements for using Claude, an AI model developed by Anthropic. The article raises concerns about the implications of needing government-issued IDs for access, drawing parallels to net neutrality debates regarding internet service providers (ISPs) controlling access based on user identity and behavior.\n\nIn the comments, there is significant debate about the concept of \"AI neutrality,\" with some users arguing that AI providers should not selectively restrict access based on user identity, similar to how ISPs might throttle internet traffic. Others counter that AI companies operate more like software-as-a-service (SaaS) providers, which can impose their own access rules. The discussion also touches on the competitive landscape of AI development, with some commenters suggesting that stringent regulations in the U.S. could drive innovation and investment overseas, particularly in countries like China and within Europe.\n\nNotable insights include concerns about the potential for AI companies to discriminate against users based on identity, echoing fears of a \"permanent underclass\" in society. Additionally, some users express skepticism about the long-term viability of AI technologies, comparing the current hype cycle to past technological fads that failed to deliver on their promises. Overall, the conversation reflects a mix of apprehension about the future of AI access and the ethical implications of identity verification in technology."}, {"title": "Don’t use AI to write things that you present as your own work", "points": 108, "author": "satisfice", "num_comments": 98, "probability": 0.883, "url": "https://www.satisfice.com/blog/archives/488148", "hn_link": "https://news.ycombinator.com/item?id=48615776", "created_at": "2026-06-21T04:50:46Z", "summary": "The Hacker News discussion revolves around a blog post that argues against using AI to write content that is presented as one's own work. The author contends that using AI without disclosure is dishonest, and even with disclosure, it undermines trust in the writer's authenticity. The post emphasizes the risks to one's reputation and brand when relying on AI for writing.\n\nIn the comments, there is a lively debate about the implications of AI in writing. Some users agree with the author's stance, asserting that AI-generated content lacks genuine human insight and effort. Others argue that the expectation of complete authenticity is unrealistic in an era where AI is ubiquitous, suggesting that critical engagement with content is more important than its origin. Notably, some commenters express frustration with the perceived laziness of both content creators and consumers, while others highlight the potential for AI to assist rather than replace human creativity.\n\nOverall, the discussion reflects a broader concern about trust, authenticity, and the evolving role of AI in creative fields, with varying opinions on how to navigate these challenges."}, {"title": "Building reliable agentic AI systems", "points": 196, "author": "sarangk90", "num_comments": 50, "probability": 0.952, "url": "https://martinfowler.com/articles/reliable-llm-bayer.html", "hn_link": "https://news.ycombinator.com/item?id=48615680", "created_at": "2026-06-21T04:28:39Z", "summary": "The Hacker News discussion revolves around an article about building reliable agentic AI systems, particularly focusing on the use of large language models (LLMs) in software development and research contexts. The article highlights the challenges of ensuring reliability and effectiveness when integrating AI tools into workflows, especially in complex systems like those used in scientific research.\n\nIn the comments, there is a significant debate about the feasibility of creating reliable AI systems. Some users argue that while LLMs can enhance productivity, they inherently come with unreliability, leading to a preference for traditional software development methods. Others emphasize the importance of context management and the need for clear data structures to improve AI performance. There is also skepticism about the proposed multi-agent architectures, with some commenters suggesting that they may be overly complex without sufficient evidence of their effectiveness.\n\nNotable insights include concerns about the evaluation methods used to assess AI systems, with some commenters questioning the validity of user satisfaction ratings and the potential for hallucinations in AI outputs. Additionally, there is a critique of the architecture proposed in the article, with suggestions for simplification and better integration of data management practices. Overall, the discussion reflects a mix of optimism about AI's potential and caution regarding its current limitations in practical applications."}, {"title": "When I reject AI code even if it works", "points": 237, "author": "vnbrs", "num_comments": 167, "probability": 0.837, "url": "https://vinibrasil.com/when-i-reject-ai-code-even-if-it-works/", "hn_link": "https://news.ycombinator.com/item?id=48614631", "created_at": "2026-06-21T00:58:13Z", "summary": "The Hacker News discussion revolves around the author's stance on rejecting AI-generated code, even if it functions correctly. The author emphasizes the importance of understanding and controlling the code one ships, arguing that reliance on AI can lead to unforeseen issues and a lack of accountability. \n\nIn the comments, there is a mix of agreement and debate. Some users support the author's perspective, highlighting the need for developers to be able to explain and troubleshoot the code they deploy. Others argue that AI can be a useful tool, especially for simpler tasks, and that risk tolerance should dictate how much one relies on AI-generated solutions. A notable concern raised is the potential for AI to produce complex and poorly designed code, which could lead to technical debt and long-term maintenance issues.\n\nSeveral commenters express skepticism about the quality of AI-generated code, pointing out that it may lack the thoughtful design and modularity that experienced developers would prioritize. There are also discussions about the implications of AI on the software development landscape, with some fearing that reliance on AI could lead to a decline in coding standards and an increase in \"spaghetti code.\" Overall, the conversation reflects a broader tension between leveraging AI for efficiency and maintaining high-quality software engineering practices."}, {"title": "Show HN: Agentic coding workflows built on Git worktrees and task evidence", "points": 10, "author": "alexreysa", "num_comments": 2, "probability": 0.827, "url": "https://github.com/alex-reysa/glueRun-go", "hn_link": "https://news.ycombinator.com/item?id=48614286", "created_at": "2026-06-20T23:58:18Z", "summary": "The Hacker News discussion revolves around a project titled \"Agentic coding workflows built on Git worktrees and task evidence,\" shared by the user alexreysa. The project aims to enhance coding efficiency by allowing multiple coding agents to work in parallel on the same repository without issues related to state management, file conflicts, or unverified changes.\n\nIn the comments, there is a notable divide in opinions. One commenter, cyanydeez, expresses skepticism about the practical benefits of the project, suggesting that the explanation is overly complex and unclear. In response, alexreysa clarifies that the primary advantage is the ability to manage multiple coding tasks simultaneously without the typical complications associated with version control.\n\nOverall, the discussion highlights a common challenge in tech projects: the balance between innovative ideas and their practical applications. While some users see potential in the approach, others remain unconvinced about its real-world utility."}, {"title": "Why Amazon hates 'human-in-the-loop' AI governance", "points": 12, "author": "ano-ther", "num_comments": 1, "probability": 0.852, "url": "https://www.theregister.com/security/2026/06/20/why-amazon-hates-human-in-the-loop-ai-governance/5258639", "hn_link": "https://news.ycombinator.com/item?id=48613719", "created_at": "2026-06-20T22:48:40Z", "summary": "The Hacker News discussion revolves around an article from The Register that explores Amazon's aversion to \"human-in-the-loop\" AI governance. The piece argues that Amazon prefers to automate decision-making processes without human oversight to avoid potential liability for errors, particularly in sensitive applications like law enforcement.\n\nIn the comments, there is a consensus that Amazon's reluctance stems from a desire to minimize accountability for the consequences of AI decisions. One commenter humorously suggests that the company internally refers to this as \"liability in the loop,\" indicating that they would rather attribute any mistakes to bugs rather than human oversight. This highlights a broader concern about the ethical implications of AI deployment and the responsibilities of companies in managing AI systems.\n\nOverall, the discussion underscores the tension between automation and accountability in AI governance, with participants reflecting on the potential risks of removing human oversight from critical decision-making processes."}, {"title": "How Lume Works: The Retrieval Primitives", "points": 11, "author": "kordlessagain", "num_comments": 1, "probability": 0.885, "url": "https://deepbluedynamics.com/blog/lume-retrieval-primitives", "hn_link": "https://news.ycombinator.com/item?id=48611251", "created_at": "2026-06-20T17:44:50Z", "summary": "The Hacker News discussion revolves around a blog post titled \"How Lume Works: The Retrieval Primitives,\" which explains the foundational components of Lume, a system designed for efficient data retrieval. The post delves into the technical aspects of Lume's architecture and how it optimizes the process of fetching data.\n\nIn the comments, user \"kordlessagain\" expresses willingness to answer questions about Lume, indicating an openness to engage with the community and clarify any points of confusion. There is a general sense of curiosity about the technology, but no significant debates or disagreements are highlighted in the comments.\n\nNotably, the discussion reflects an interest in understanding the practical applications of Lume's retrieval primitives, as well as how they compare to existing solutions. The willingness of the commenter to engage suggests a collaborative atmosphere, encouraging further exploration of the topic."}, {"title": "Show HN: We post-trained a model that pen tests instead of refusing", "points": 93, "author": "dk189", "num_comments": 40, "probability": 0.933, "url": "https://www.argusred.com/cli", "hn_link": "https://news.ycombinator.com/item?id=48609231", "created_at": "2026-06-20T13:49:03Z", "summary": "The Hacker News discussion revolves around a new AI tool developed by ArgusRed that has been post-trained to perform penetration testing (pen testing) on software systems, unlike existing models from companies like Anthropic and OpenAI, which refuse to engage in offensive tasks. The tool offers two modes: a security scan that audits code for vulnerabilities and a pen test mode that actively attempts to exploit vulnerabilities in a controlled environment. The developers argue that small and medium enterprises (SMEs) need access to such tools to identify vulnerabilities, as current offerings are primarily gated for larger enterprises.\n\nIn the comments, there is a mix of agreement and skepticism regarding the tool's safety and accessibility. Some users express concern about the potential for bad actors to misuse such technology, while others argue that restricting access may leave a significant portion of the market underserved. There is also debate about the effectiveness of commercial interests in preventing misuse and whether the tool's gated access is a responsible choice. Notably, some commenters highlight that if a small team can post-train an open model for offensive tasks, so can malicious actors, suggesting that the barriers to misuse may be temporary.\n\nOverall, the discussion underscores the tension between the need for robust cybersecurity tools for SMEs and the ethical implications of making such powerful technologies accessible, with many participants questioning the feasibility of effectively gatekeeping offensive AI tools."}, {"title": "Temporary Cloudflare accounts for AI agents", "points": 249, "author": "farhadhf", "num_comments": 151, "probability": 0.838, "url": "https://blog.cloudflare.com/temporary-accounts/", "hn_link": "https://news.ycombinator.com/item?id=48608394", "created_at": "2026-06-20T11:19:05Z", "summary": "The Hacker News discussion revolves around Cloudflare's introduction of temporary accounts for AI agents, as detailed in their blog post. These accounts allow AI tools to interact with Cloudflare's services without needing a permanent account, raising questions about potential abuse and the implications for web security.\n\nIn the comments, users express a mix of agreement and concern regarding Cloudflare's architecture. Many developers wish for a more straightforward container-based compute option, citing frustrations with the current reliance on Cloudflare Workers, which they feel creates vendor lock-in. There is also debate about the effectiveness of Cloudflare's measures to prevent abuse of these temporary accounts, with some commenters criticizing the company's responsiveness to reports of malicious content hosted on their platform.\n\nNotable insights include skepticism about Cloudflare's ability to manage the potential misuse of these accounts, with some users suggesting that the company may inadvertently facilitate bot activity. Others highlight the challenges faced by legitimate users who are often misclassified as bots, leading to a frustrating experience when trying to access content. Overall, the discussion reflects a broader concern about balancing innovation in AI with the need for robust security measures."}, {"title": "I solved my mystery fatigue with AI", "points": 39, "author": "staticshock", "num_comments": 26, "probability": 0.853, "url": "https://metalearn.substack.com/p/i-solved-my-mystery-fatigue-with-ai", "hn_link": "https://news.ycombinator.com/item?id=48605117", "created_at": "2026-06-20T00:47:54Z", "summary": "The Hacker News discussion revolves around a post titled \"I solved my mystery fatigue with AI,\" where the author shares their experience of using AI to help identify and address their fatigue, which was linked to dietary issues and medication adjustments related to a brain tumor. The author emphasizes the importance of data collection in understanding their health condition.\n\nIn the comments, there is significant debate about the actual role AI played in the author's journey. Some commenters argue that the real breakthroughs came from medical professionals and personal advocacy rather than AI, questioning the effectiveness of AI in this context. Others suggest that AI can be valuable for data collection and pattern recognition, potentially aiding communication with healthcare providers.\n\nNotable insights include discussions on the importance of iron and other nutrients in addressing fatigue, as well as the potential for AI to revolutionize primary care. However, there are concerns about over-reliance on AI without proper medical oversight, highlighting the need for a balanced approach that combines technology with human expertise."}, {"title": "Delete Doesn't Mean Deleted. Just Ask OpenAI", "points": 10, "author": "rmason", "num_comments": 0, "probability": 0.865, "url": "https://lindsaygross1.substack.com/p/delete-doesnt-mean-deleted-just-ask", "hn_link": "https://news.ycombinator.com/item?id=48603143", "created_at": "2026-06-19T20:55:12Z", "summary": "The Hacker News discussion revolves around a post titled \"Delete Doesn't Mean Deleted. Just Ask OpenAI,\" which explores the complexities and implications of data deletion in the context of AI and digital platforms. The author argues that when users delete their data, it often remains stored in some form, raising concerns about privacy and data ownership.\n\nIn the comments, participants generally agree on the challenges of truly deleting data in the digital age, with some debating the ethical responsibilities of companies like OpenAI in handling user data. Notable insights include the recognition that users often lack a clear understanding of how their data is managed and the potential risks associated with data retention practices.\n\nOverall, the discussion highlights the tension between user expectations of privacy and the realities of data management, emphasizing the need for greater transparency and user control over personal information."}, {"title": "Agentic Coding Is a Trap", "points": 16, "author": "MaxMussio", "num_comments": 11, "probability": 0.829, "url": "https://khalilstemmler.com/articles/agentic-coding-is-a-trap/", "hn_link": "https://news.ycombinator.com/item?id=48600935", "created_at": "2026-06-19T17:33:32Z", "summary": "The Hacker News discussion revolves around an article titled \"Agentic Coding Is a Trap,\" which critiques the reliance on AI-assisted coding tools. The author argues that such tools may lead to skill atrophy among developers, particularly those who lack foundational coding knowledge. The article suggests that while AI can enhance productivity, it may also diminish critical problem-solving skills.\n\nIn the comments, there is a mix of agreement and skepticism regarding the article's claims. Some users express concern that AI tools are making coding easier but could ultimately undermine developers' abilities, regardless of their experience level. Others point out that the article may have been generated by AI itself, highlighting a trend of AI-written content critiquing AI. Notably, some commenters emphasize that problem-solving remains the core skill in programming, regardless of the tools used, and suggest that understanding the underlying processes is crucial for effective coding.\n\nOverall, the discussion reflects a broader debate about the implications of AI in software development, with varying opinions on its impact on skill development and the nature of coding as a discipline."}, {"title": "MiniMax M3 vs. GLM 5.2: Codegen comparison across autonomous coding tasks", "points": 55, "author": "oceanwaves", "num_comments": 19, "probability": 0.865, "url": "https://thinkwright.ai/minimax-m3-vs-glm-5-2-coding-benchmark", "hn_link": "https://news.ycombinator.com/item?id=48600531", "created_at": "2026-06-19T16:52:54Z", "summary": "The Hacker News discussion revolves around a comparison between two AI models, MiniMax M3 and GLM 5.2, specifically in the context of their performance in autonomous coding tasks. The original post highlights that while GLM 5.2 is generally regarded as the safer option for complex projects requiring complete, runnable code, MiniMax M3 is seen as a more cost-effective choice for high-volume tasks.\n\nIn the comments, users express a mix of agreement and debate regarding the models' effectiveness. Many agree that MiniMax M3 is better suited for simpler, repetitive tasks, while GLM 5.2 excels in more challenging scenarios. There are calls for comparisons with other models, such as Deepseek and GPT, and discussions about the implications of using these models as coordinators versus workers. Some commenters emphasize the importance of having a more capable model oversee the outputs of these AIs, while others argue for the practicality of using them directly for coding tasks.\n\nNotable insights include concerns about the limitations of current benchmarks, with some users suggesting that they fail to accurately measure long-term performance. Additionally, there are discussions about the evolving security features of these models, with some expressing frustration over perceived over-caution in their design. Overall, the conversation reflects a nuanced understanding of the strengths and weaknesses of each model in the context of coding tasks."}, {"title": "GPT-5.5 hallucinates 3x more than MIT-licensed GLM-5.2", "points": 585, "author": "oshrimpton", "num_comments": 293, "probability": 0.868, "url": "https://arrowtsx.dev/bigger-models/", "hn_link": "https://news.ycombinator.com/item?id=48600167", "created_at": "2026-06-19T16:11:25Z", "summary": "The Hacker News discussion revolves around a post comparing the hallucination rates of various large language models (LLMs), specifically highlighting that GPT-5.5 reportedly hallucinates three times more than the MIT-licensed GLM-5.2. The term \"hallucination\" refers to instances where a model generates incorrect or fabricated information instead of acknowledging uncertainty.\n\nIn the comments, there is significant debate about the implications of hallucination rates and the nature of knowledge in LLMs. Some users argue that the quent claims of being the \"root\" of current AI advancements may be overstated, with critiques of his tendency to demand citations for his earlier work. The discussion also touches on broader themes about the relationship between academia and private research labs, with some commenters defending academic contributions while others criticize the inefficiencies and perceived irrelevance of academic research in practical applications.\n\nNotable insights include the recognition that scientific progress often builds on a complex web of prior work, making it difficult to pinpoint singular contributions. Additionally, there is a consensus that while academia has its flaws, it remains a crucial foundation for advancements in technology, and the interplay between academic research and private sector innovation is essential for future breakthroughs."}, {"title": "Temporary Cloudflare Accounts for AI Agents", "points": 12, "author": "soheilpro", "num_comments": 3, "probability": 0.838, "url": "https://blog.cloudflare.com/temporary-accounts/", "hn_link": "https://news.ycombinator.com/item?id=48598906", "created_at": "2026-06-19T14:17:59Z", "summary": "The Hacker News discussion revolves around a Cloudflare blog post introducing temporary accounts designed for AI agents. These accounts allow AI systems to perform tasks without permanent user ties, potentially streamlining operations but raising concerns about misuse.\n\nIn the comments, there is a consensus that while the feature could be beneficial, it also poses risks. One user expresses concern that it could enable malicious actors to conduct phishing campaigns without accountability. Another commenter questions when an AI agent might be able to claim ownership of such accounts, hinting at the potential for misuse if AI systems gain more autonomy.\n\nOverall, the discussion highlights a mix of curiosity and caution regarding the implications of temporary accounts for AI agents, emphasizing the need for careful consideration ng AI with traditional CAD methods may be more effective.\n\nOverall, while there is excitement about the potential of CADAM, many professionals in the field remain cautious, emphasizing the importance of precision and practical application in mechanical design."}, {"title": "Show HN: Mira – Open-source and self-hosted AI code reviewer", "points": 15, "author": "upmostly", "num_comments": 2, "probability": 0.888, "url": "https://github.com/miracodeai/mira", "hn_link": "https://news.ycombinator.com/item?id=48570197", "created_at": "2026-06-17T13:23:54Z", "summary": "The Hacker News discussion centers around Mira, an open-source, self-hosted AI code reviewer created by Jay and his team. Mira allows users to bring their own AI models (BYOK) and is designed to be fast and efficient, with an average review time of 77 seconds compared to competitors like Greptile, which takes about 5 minutes. Key features include the ability to analyze the potential impact of code changes, learn from the codebase without needing a configuration file, and ensure that code remains within the user's infrastructure.\n\nIn the comments, there is a focus on the benchmark results presented in Mira's documentation, with a user asking which model was used for these benchmarks. Jay responds that they utilized Claude Sonnet 4.5 and referenced the Martian code review benchmark for their comparisons. The discussion highlights interest in the performance metrics and the potential of self-hosted solutions in the AI code review space, with users expressing curiosity about the underlying models and their effectiveness. Overall, the conversation reflects a positive reception of Mira's capabilities and a desire for community involvement in its development."}, {"title": "Why thinking out loud with someone beats thinking alone", "points": 332, "author": "kodesko", "num_comments": 151, "probability": 0.823, "url": "https://www.thesignalist.io/s/the-dialogue-dividend/", "hn_link": "https://news.ycombinator.com/item?id=48569894", "created_at": "2026-06-17T13:00:38Z", "summary": "The Hacker News discussion revolves around the idea that thinking out loud with someone can be more effective than solitary contemplation. The original article emphasizes the benefits of verbalizing thoughts, which can help clarify ideas and stimulate deeper understanding. The discussion references historical figures like Einstein, who credited colleagues for their contributions, highlighting the collaborative nature of thought development.\n\nIn the comments, there is a mix of agreement and debate regarding the effectiveness of verbalizing thoughts versus internal contemplation. Some users share personal anecdotes about how articulating problems, whether to a colleague or even a rubber duck, has helped them find solutions. Others argue that the process of structuring thoughts into sentences is what truly aids understanding, rather than the act of speaking itself. There are also discussions about the role of disagreement in stimulating thought and the varying cognitive styles among individuals, with some noting cultural differences in communication preferences.\n\nNotable insights include the recognition that different people think in different ways—some rely heavily on internal monologues, while others may not verbalize their thoughts at all. This diversity in cognitive processing suggests that the effectiveness of thinking out loud may vary from person to person. Overall, the conversation underscores the importance of dialogue in the creative and problem-solving processes, while also acknowledging the complexities of individual thought patterns."}, {"title": "Human Judgment as a Specification", "points": 57, "author": "surprisetalk", "num_comments": 21, "probability": 0.877, "url": "https://blog.brownplt.org/2026/06/09/pick.html", "hn_link": "https://news.ycombinator.com/item?id=48569677", "created_at": "2026-06-17T12:45:10Z", "summary": "The Hacker News discussion revolves around a blog post titled \"Human Judgment as a Specification,\" which explores the concept of using human judgment to clarify and specify the outcomes of machine learning models, particularly in the context of code generation. The author introduces a framework called PICK, which emphasizes the importance of understanding user intent and the limitations of models in producing satisfactory results. The discussion highlights the need for formal verification in distinguishing between benign and harmful applications of generated code.\n\nIn the comments, there is a debate about the feasibility of ensuring that generated code is free from dual-use concerns, with some arguing that it is impossible to ascertain the intent behind prompts. Others emphasize the importance of reading and understanding generated code, suggesting that better tools and practices should be developed to facilitate this. Notably, there is a distinction made between the predictability of traditional compilers and the unpredictability of outputs from large language models (LLMs), with some commenters advocating for a more nuanced understanding of how to interact with these technologies.\n\nOverall, the discussion reflects a tension between the desire for automation in coding and the necessity of human oversight, with participants expressing concerns about accountability and the quality of generated code. There is a consensus on the importance of improving user engagement with generated outputs while acknowledging the challenges posed by the inherent unpredictability of LLMs."}, {"title": "Ask HN: What are your best Claude hacks?", "points": 17, "author": "akashwadhwani35", "num_comments": 17, "probability": 0.89, "url": null, "hn_link": "https://news.ycombinator.com/item?id=48565600", "created_at": "2026-06-17T04:15:46Z", "summary": "The Hacker News discussion revolves around users sharing their effective strategies, or \"hacks,\" for utilizing Claude, an AI tool. The original post highlights a workflow where users collect nters argue that this reliance on AI could make knowledgeable individuals feel less competent, while others emphasize that the phenomenon is not new and has been exacerbated by the internet's information overload.\n\nNotable insights include the recognition that while AI can enhance productivity for informed users, it can also mislead those who lack expertise. There is a concern that as AI becomes more integrated into decision-making, it may lead to a society where critical thinking is diminished, and people are more prone to accept AI-generated content as authoritative. The discussion highlights the dual nature of AI as both a tool for empowerment and a potential source of misinformation."}, {"title": "Show HN: VoiceDraw – Talk system design out loud, the diagrams draw themselves", "points": 49, "author": "ajaypanthagani", "num_comments": 20, "probability": 0.887, "url": "https://voicedraw.com/", "hn_link": "https://news.ycombinator.com/item?id=48560454", "created_at": "2026-06-16T19:13:30Z", "summary": "The Hacker News discussion revolves around a new tool called VoiceDraw, which allows users to verbally discuss system design while automatically generating diagrams based on their conversation. The creator, frustrated with manually drawing diagrams during discussions or interviews, developed this tool to streamline the process and enhance clarity.\n\nIn the comments, users generally express enthusiasm for the concept, with some noting that the generated diagrams look better than their own drawings. However, there are reports of technical issues, such as connection errors and difficulties in generating diagrams. Some users provide constructive feedback, suggesting improvements for accessibility, particularly for visually impaired users, and highlighting the need for clearer documentation regarding the tool's underlying technology, which is based on Excalidraw.\n\nNotable insights include a suggestion for richer descriptions of diagrams for screen readers and a discussion about the importance of user data privacy, with some users expressing concerns about how their data is handled. Overall, the feedback is a mix of praise for the tool's potential and constructive criticism aimed at refining its functionality and accessibility."}, {"title": "Z.ai GLM 5.2", "points": 16, "author": "theanonymousone", "num_comments": 1, "probability": 0.87, "url": "https://huggingface.co/zai-org/GLM-5.2", "hn_link": "https://news.ycombinator.com/item?id=48559385", "created_at": "2026-06-16T18:04:44Z", "summary": "The Hacker News discussion centers around the release of Z.ai's GLM 5.2, a model designed for coding tasks, particularly in the Chinese language. The post includes a link to the model's page on Hugging Face, where users can explore its features and performance.\n\nIn the comments, user \"osti\" highlights the model's impressive performance on the DeepSwe coding benchmark, suggesting that it closely rivals the capabilities of the Opus 4.8 model. They assert that GLM 5.2 stands out as the best Chinese coding model available, marking a significant improvement over its predecessor, GLM 5.1, and other competing models.\n\nOverall, the discussion reflects a consensus on the model's strong performance, particularly in coding tasks, and positions it as a leading option for developers working in Chinese. There is a sense of excitement about its potential impact on coding in that language."}, {"title": "GPT‑NL: a sovereign language model for the Netherlands", "points": 252, "author": "root-parent", "num_comments": 305, "probability": 0.829, "url": "https://www.tno.nl/en/digital/artificial-intelligence/gpt-nl/", "hn_link": "https://news.ycombinator.com/item?id=48559188", "created_at": "2026-06-16T17:54:02Z", "summary": "The Hacker News discussion revolves around the announcement of GPT-NL, a sovereign language model being developed for the Netherlands. The project aims to create a Dutch-language model that respects copyright laws and compensates content creators fairly. However, it has faced skepticism regarding its progress and viability, with some commenters questioning the model's competitiveness against existing state-of-the-art models and its overall utility.\n\nKey points of debate include the definition of \"sovereign\" in this context, with some arguing that it merely means in-house development rather than true independence. Others express concerns about the model's performance and whether it can meet the needs of Dutch users compared to existing models. There are also discussions about the importance of having localized models to ensure cultural relevance and compliance with local regulations, especially in sensitive areas like government and privacy.\n\nNotable insights include the idea that while creating a sovereign model may seem unnecessary given the availability of open-source options, there are valid reasons for countries to develop their own models to maintain control over data and cultural representation. Some commenters emphasize the need for a broader ecosystem of talent and resources in Europe to compete effectively in the AI landscape, highlighting a perceived gap in investment and innovation compared to the US and China."}, {"title": "GLM-5.2: Built for Long-Horizon Tasks", "points": 32, "author": "meetpateltech", "num_comments": 2, "probability": 0.855, "url": "https://z.ai/blog/glm-5.2", "hn_link": "https://news.ycombinator.com/item?id=48558960", "created_at": "2026-06-16T17:41:07Z", "summary": "The Hacker News discussion centers around the release of GLM-5.2, a model designed for long-horizon tasks, as detailed in the linked blog post. The release is highlighted as a significant update compared to a previous announcement, indicating that it is now officially available for use.\n\nIn the comments, users express excitement about the model's potential, particularly regarding its performance benchmarks and real-world applicability. One commenter notes the competitive pricing of GLM-5.2 at $1.4/$4.4 per token, which is significantly lower than the cost of similar models like Opus, making it an attractive option for users. There is a general consensus on the impressive nature of the model, with anticipation for further analysis and testing to validate its capabilities.\n\nOverall, the discussion reflects optimism about GLM-5.2's performance and affordability, with users eager to see how it performs in practical applications."}, {"title": "Claude: Elevated errors across many models [resolved]", "points": 189, "author": "forks", "num_comments": 160, "probability": 0.881, "url": "https://status.claude.com/incidents/xmhsglsz3h3w", "hn_link": "https://news.ycombinator.com/item?id=48558766", "created_at": "2026-06-16T17:30:30Z", "summary": "The Hacker News discussion revolves around a recent incident involving Claude, an AI model, which experienced elevated errors across various models. The issue has since been resolved, but users expressed frustration over how these errors disrupted long-running sessions and rendered them unusable. \n\nIn the comments, there is a consensus that while Claude has a retry mechanism, it often fails to function as expected, leading to dissatisfaction among users. Many commenters shared their experiences with Claude's performance, noting that it can be buggy and slow, particularly in terminal environments like Windows and tmux. Some users compared Claude unfavorably to other models, such as OpenAI's offerings, citing stability and reliability as significant concerns. \n\nNotable insights include a debate over the claim that \"coding is solved,\" with some users arguing that while AI can assist in coding, it doesn't eliminate the complexities of software engineering. There’s also a recognition of the rapid scaling challenges faced by AI companies like Anthropic, which may contribute to the bugs and reliability issues. Overall, the discussion highlights a mix of frustration with current performance and a cautious optimism about the e include the value of self-help books versus AI-generated content, with some commenters arguing that AI can distill useful insights from the noise of self-help literature. Others question the actual substance of popular self-help titles, labeling many as scams or overly simplistic. There is also a discussion about the shift of self-help content to modern platforms like podcasts and YouTube, where creators can monetize their content more effectively than through traditional publishing.\n\nNotable insights include the acknowledgment that while self-help books may be declining, the demand for personal development content persists, now taking different forms. Some commenters highlight the importance of visual and audio content for learning, suggesting that the medium of delivery is evolving alongside consumer preferences. Overall, the conversation reflects a broader trend in how people seek and consume self-help and educational material in the digital age."}, {"title": "Show HN: Memento – Self-hosted agentic search and LLM wiki over your email", "points": 12, "author": "georgeck", "num_comments": 11, "probability": 0.9, "url": null, "hn_link": "https://news.ycombinator.com/item?id=48557937", "created_at": "2026-06-16T16:36:07Z", "summary": "The Hacker News discussion centers around \"Memento,\" a self-hosted tool designed to transform personal email archives into a searchable, curated wiki. The creators, George and Ann, explain that Memento organizes emails into four dimensions: People, Projects, Concepts, and Newsletters, allowing users to create a cohesive narrative of their life experiences. It employs advanced search capabilities and can integrate with LLMs for enhanced functionality while maintaining user privacy.\n\nIn the comments, users express interest in expanding Memento's capabilities to other platforms like Slack and suggest improvements, such as clearer setup instructions for Msgvault, which is necessary for Memento to function. There are also concerns about managing the potential clutter of information in the generated wiki and how it will handle conflicting or outdated facts over time. The creators respond positively to feedback, indicating that they have tools in place to address these issues, such as flagging gaps in timelines and managing evolving narratives.\n\nOverall, the discussion highlights a strong interest in Memento's potential for personal organization and memory management, with users eager to see further developments and integrations."}, {"title": "Can gzip be a language model?", "points": 15, "author": "nathan-barry", "num_comments": 2, "probability": 0.821, "url": "https://nathan.rs/posts/gzip-lm/", "hn_link": "https://news.ycombinator.com/item?id=48557691", "created_at": "2026-06-16T16:21:04Z", "summary": "The Hacker News discussion revolves around the idea of using gzip, a compression algorithm, as a language model. The original post explores the surprising effectiveness of gzip in modeling language, despite its primary function being data compression. The author notes that while the quality of the language modeling isn't exceptional, the concept of leveraging a compressor for this purpose is intriguing.\n\nIn the comments, users express agreement on the potential of large language models (LLMs) to perform lossless compression effectively, particularly through techniques like arithmetic coding. One commenter highlights that other compression algorithms, such as PPMd, utilize variable n-grams and may yield better results, though they are less novel since they inherently incorporate language modeling. Another commenter references a YouTube video that provides additional insights into why using a compressor for language modeling can work, indicating a shared interest in the underlying mechanics of this approach.\n\nOverall, the discussion reflects a mix of curiosity and technical analysis regarding the intersection of compression algorithms and language modeling, with participants appreciating the unexpected capabilities of gzip in this context."}, {"title": "Show HN: BlitzGraph – Supabase for graphs, built for LLM agents", "points": 15, "author": "lveillard", "num_comments": 13, "probability": 0.835, "url": "https://blitzgraph.com", "hn_link": "https://news.ycombinator.com/item?id=48557002", "created_at": "2026-06-16T15:41:02Z", "summary": "The Hacker News discussion centers around the launch of BlitzGraph, a new graph database designed specifically for AI agents, which aims to move away from traditional SQL paradigms. The creator, who became frustrated with existing graph databases like Dgraph, Typedb, and SurrealDB, highlights BlitzGraph's unique features such as polymorphic records, bidirectional relations, and a JSON query language tailored for AI. The goal is to create a more intuitive and efficient way to model complex relationships and track entities over time.\n\nIn the comments, users express a mix of skepticism and curiosity. Some question what makes BlitzGraph more suitable for AI agents compared to established databases like Neo4j and Typedb, with performance and temporal modeling being key points of discussion. Others share their negative experiences with Neo4j's speed and express interest in BlitzGraph's potential. There are also critiques of the need for yet another database solution, with suggestions to consider existing technologies like RDF and SPARQL.\n\nNotably, the creator emphasizes the extensive effort put into identifying gaps in existing databases, which led to the development of BlitzGraph. This reflects a broader sentiment in the tech community about the need for innovation in database design, especially for modern applications involving AI. The discussion highlights both the excitement around new technologies and the challenges of breaking into a space dominated by established players."}, {"title": "Qwen-Robot Suite: A Foundation Model Suite for Physical World Intelligence", "points": 213, "author": "ilreb", "num_comments": 42, "probability": 0.91, "url": "https://qwen.ai/blog?id=qwen-robotsuite", "hn_link": "https://news.ycombinator.com/item?id=48554814", "created_at": "2026-06-16T13:15:15Z", "summary": "The Hacker News discussion revolves around the Qwen-Robot Suite, a new foundation model suite designed for enhancing physical world intelligence in robotics. The announcement highlights the suite's potential applications in various fields, including manufacturing and autonomous systems, and discusses the hardware platforms, such as the NVIDIA Jetson Thor, that can leverage these models.\n\nIn the comments, users express a mix of enthusiasm and skepticism. Many agree on the significant market potential for robotics, suggesting that the technology could lead to practical applications in everyday tasks, such as snow clearing and home chores. However, there are concerns about the complexity of the Qwen.ai website, which some users find difficult to navigate. Additionally, discussions touch on the challenges of deploying robots in unstructured environments and the implications of using advanced AI in military applications.\n\nNotable insights include the idea that the robotics market could expand dramatically as AI models become more capable, potentially transforming industries and everyday life. Some commenters also emphasize the importance of training models in real-world scenarios to improve their effectiveness, while others speculate on the future of robotics and AI integration, hinting at a shift in how physical tasks are approached."}, {"title": "Can open-source beat OpenAI?", "points": 11, "author": "devonnull", "num_comments": 0, "probability": 0.865, "url": "https://restofworld.org/2026/tiezhen-wang-china-us-open-source-ai/", "hn_link": "https://news.ycombinator.com/item?id=48551032", "created_at": "2026-06-16T05:41:09Z", "summary": "The Hacker News discussion revolves around the article titled \"Can open-source beat OpenAI?\" which explores the competitive landscape between open-source ith many ideas failing despite equal effort and intelligence among researchers. Some commenters discuss the phenomenon of researchers experiencing initial success but struggling to replicate it later in their careers. There is also a debate about the nature of inspiration and creativity, with some likening the human mind to a large language model that requires external prompts for original ideas.\n\nNotable insights include the comparison of Western interpretations of Zen and Stoicism to their Eastern roots, emphasizing the differences in purpose and practice. Several commenters reflect on the broader implications of these philosophies in both research and life, suggesting that understanding and embracing uncertainty can lead to more profound insights and creativity."}, {"title": "Show HN: Veterinarian turned founder, AI lawn diagnosis", "points": 78, "author": "andrewbr", "num_comments": 60, "probability": 0.822, "url": "https://grassdx.com/", "hn_link": "https://news.ycombinator.com/item?id=48544823", "created_at": "2026-06-15T17:56:00Z", "summary": "The Hacker News discussion revolves around a new AI tool for diagnosing lawn problems, created by a veterinarian named Andrew. Frustrated by his own lawn care challenges and the lack of tailored solutions, he developed a platform where users can upload lawn pictures and receive localized diagnoses along with actionable steps in just 15 seconds. The service is free, monetized through affiliate sales and by selling leads to lawn care companies.\n\nIn the comments, there is a mix of support and skepticism. Some users express concern about the environmental impact of traditional lawns and suggest including eco-friendly alternatives or landscaping options. Others emphasize the need for the tool to cater to diverse user goals, such as low maintenance or biodiversity. Notably, Andrew acknowledges these insights and considers integrating more options for users. There are also discussions about the platform's differentiation from generic AI chatbots, with suggestions for improving user experience and expanding the service's capabilities.\n\nOverall, the conversation highlights a blend of enthusiasm for innovative solutions in lawn care and critical reflections on the broader implications of maintaining traditional lawns versus exploring more sustainable practices."}, {"title": "Show HN: We put voice agent on our website, learned retrieval isn't bottleneck", "points": 24, "author": "srimalireddi", "num_comments": 8, "probability": 0.93, "url": "https://www.moss.dev/blog/founding-agent", "hn_link": "https://news.ycombinator.com/item?id=48543105", "created_at": "2026-06-15T15:52:35Z", "summary": "The Hacker News discussion centers around a post titled \"Show HN: We put voice agent on our website, learned retrieval isn't bottleneck,\" which highlights the implementation of a voice agent called Founding Agent on a website, powered by Moss's fast retrieval system. The author emphasizes that their retrieval speed is under 10 milliseconds, significantly improving the conversational experience compared to typical systems that take 200-500 milliseconds.\n\nIn the comments, users express interest in the technology, with some asking about its effectiveness on dense websites and scalability as content grows. The developer, srimalireddi, reassures that the system works well with dense content and explains the architecture of the voice agent, noting that the retrieval speed and quality are key factors. There is a consensus on the potential of this technology, with users intrigued by its application and performance.\n\nNotable insights include the emphasis on the importance of retrieval speed for a seamless user experience and the potential challenges of scaling as the amount of content increases. Overall, the discussion reflects excitement about advancements in voice technology and its practical applications for websites."}, {"title": "Ask HN: Has anyone replaced Claude/GPT with a local model for daily d the feasibility of Europe training a frontier AI model using its own computing resources. The original post raises questions about whether Europe can effectively organize the necessary capital and cross-border collaboration to build competitive AI models, especially in light of existing geopolitical and bureaucratic challenges.\n\nIn the comments, there is significant debate about Europe's ability to cooperate on large-scale projects, with many expressing skepticism about the EU's capacity to unify its member states for such initiatives. Some commenters highlight the dysfunctionality of the EU compared to the more cohesive approach of the U.S., pointing out that national interests often hinder collaborative efforts. Others discuss the implications of immigration policies on the tech landscape, arguing that political distractions detract from meaningful advancements in AI.\n\nNotable insights include concerns about Europe's outdated corporate laws and inability to attract top talent due to lower salaries and incentives compared to the U.S. Additionally, the discussion touches on the challenges of data acquisition and regulatory constraints in the EU, which complicate the development of competitive AI models. Overall, the conversation reflects a mix of skepticism and hope regarding Europe's potential in the AI space, emphasizing the need for better organization and cooperation among member states."}, {"title": "Tell HN: Claude is completely unusable for biology", "points": 17, "author": "Protostome", "num_comments": 5, "probability": 0.868, "url": null, "hn_link": "https://news.ycombinator.com/item?id=48538686", "created_at": "2026-06-15T09:17:41Z", "summary": "The Hacker News discussion revolves around a user's frustration with the AI model Claude, which they find nearly unusable for basic biology research, particularly immunology. The user notes that legitimate scientific inquiries often get flagged due to the model's safety guardrails, which they believe hinder its effectiveness as a research assistant. They also point out the irony that while Claude restricts certain biology-related prompts, other models can be used in conjunction with tools for potentially harmful applications without similar restrictions.\n\nIn the comments, users share their experiences with Claude and other AI models in scientific contexts. Some ask for clarification on what constitutes \"straightforward immunology questions,\" while others suggest that laying groundwork in conversations might help avoid flagging issues. A few commenters mention their own experiences with censorship in biology-related queries, highlighting that while some models have limitations, others may not flag similar content.\n\nNotably, the discussion reveals a broader concern about the balance between safety measures and the utility of AI tools in scientific research. Users express a desire for more nuanced guardrails that allow for legitimate inquiries without compromising safety."}, {"title": "AI is code – and can't be prompted into being smarter", "points": 158, "author": "wglb", "num_comments": 145, "probability": 0.852, "url": "https://www.theregister.com/ai-and-ml/2026/06/14/ai-is-code-and-cant-be-prompted-into-being-smarter/5254141", "hn_link": "https://news.ycombinator.com/item?id=48532178", "created_at": "2026-06-14T20:17:54Z", "summary": "The Hacker News discussion revolves around an article titled \"AI is code – and can't be prompted into being smarter,\" which argues that while AI can be configured for better performance, it fundamentally cannot be made \"smarter\" through prompting alone. The conversation delves into the complexities of verifying AI behavior versus traditional programming, with participants debating the feasibility and implications of prompt injection vulnerabilities in AI systems.\n\nKey points of agreement include the notion that while traditional programs can be verified against specifications, AI's behavior is less predictable and harder to validate. Some commenters argue that better prompting and context engineering can enhance AI performance, akin to optimizing traditional software. However, there is significant debate about the inherent risks of prompt injection, with some asserting that it poses a unique challenge that cannot be easily mitigated, while others suggest that it is a manageable issue akin to historical software vulnerabilities.\n\nNotable insights include concerns about the ethical implications of using AI without proper safeguards, the potential for AI to be manipulated by malicious prompts, and the broader implications of relying on AI systems in critical applications. The discussion reflects a mix of skepticism about AI's reliability and optimism about its potential when properly managed."}, {"title": "AI is code and can't be prompted into being smarter", "points": 15, "author": "adam_rida", "num_comments": 16, "probability": 0.866, "url": "https://www.theregister.com/ai-and-ml/2026/06/14/ai-is-code-and-cant-be-prompted-into-being-smarter/", "hn_link": "https://news.ycombinator.com/item?id=48529112", "created_at": "2026-06-14T16:27:17Z", "summary": "The Hacker News discussion centers around an article titled \"AI is code and can't be prompted into being smarter,\" which argues that large language models (LLMs) fundamentally operate as next-token predictors based on their training data. The article suggests that while LLMs can generate responses that may appear intelligent, they do not possess true understanding or reasoning capabilities.\n\nIn the comments, there is a debate about the nature of LLMs and their ability to produce seemingly smarter outputs through specific prompts or additional data. Some users, like moezd, emphasize that the output quality is directly tied to the input data, while others, like halJordan, argue that prompting techniques like Chain of Thought (CoT) can enhance the perceived intelligence of LLMs. There are also discussions about the susceptibility of these em."}, {"title": "Reinventing Control Theory One Feature at a Time: The Fallacy of Agentic Loops", "points": 20, "author": "oddish-tv", "num_comments": 0, "probability": 0.866, "url": "https://medium.com/agileinsider/reinventing-control-theory-one-feature-at-a-time-the-fallacy-of-agentic-loops-01dd533615de", "hn_link": "https://news.ycombinator.com/item?id=48526193", "created_at": "2026-06-14T11:22:49Z", "summary": "The Medium post titled \"Reinventing Control Theory One Feature at a Time: The Fallacy of Agentic Loops\" discusses the limitations of traditional control theory in the context of modern software development and agile methodologies. The author argues that the concept of \"agentic loops,\" which suggests that agents (like software features) can autonomously adapt and improve, is flawed. Instead, the post emphasizes the need for a more nuanced understanding of control mechanisms that account for the complexities of human behavior and system interactions.\n\nIn the Hacker News discussion, commenters engage with the author's critique of agentic loops, with some agreeing on the need for a more comprehensive approach to control theory. Others debate the practicality of implementing such theories in real-world software development, highlighting the tension between theoretical frameworks and the realities of agile practices. Notable insights include the recognition that while autonomy in software can be beneficial, it must be balanced with oversight and intentional design to avoid unintended consequences. Overall, the discussion reflects a mix of support for the author's views and skepticism about their applicability in practice."}, {"title": "Ask HN: What problem did AI create at your company that didn't exist before?", "points": 12, "author": "Yatsui", "num_comments": 12, "probability": 0.886, "url": null, "hn_link": "https://news.ycombinator.com/item?id=48525718", "created_at": "2026-06-14T09:50:34Z", "summary": "The Hacker News discussion revolves around the   const listEl = document.getElementById("list");
  const countLine = document.getElementById("count-line");
  const emptyEl = document.getElementById("empty");
  const emptyTerm = document.getElementById("empty-term");
  const searchEl = document.getElementById("search");
  const sortBtns = Array.from(document.querySelectorAll(".sort-btn:not(.date-btn)"));
  const dateBtns = Array.from(document.querySelectorAll(".date-btn"));

  let sortKey = "points";
  let query = "";
  let dateRange = "all";

  function domainOf(url) {
    if (!url) return null;
    try {
      return new URL(url).hostname.replace(/^www\./, "");
    } catch (e) {
      return null;
    }
  }

  function timeAgo(iso) {
    const then = new Date(iso).getTime();
    const now = Date.now();
    const hrs = Math.max(1, Math.round((now - then) / 3.6e6));
    if (hrs < 24) return hrs + "h ago";
    return Math.round(hrs / 24) + "d ago";
  }

  function render() {
    const q = query.trim().toLowerCase();
    const cutoff = dateRange === "all" ? null : Date.now() - Number(dateRange) * 24 * 3.6e6;
    let rows = DATA.filter(r =>
      (!q || r.title.toLowerCase().includes(q) || (r.author || "").toLowerCase().includes(q)) &&
      (cutoff === null || new Date(r.created_at).getTime() >= cutoff)
    );
    rows = rows.slice().sort((a, b) => b[sortKey] - a[sortKey]);

    countLine.textContent = (q || cutoff !== null)
      ? `Showing ${rows.length} of ${DATA.length} posts`
      : `Showing all ${rows.length} posts`;

    emptyEl.style.display = rows.length ? "none" : "block";
    emptyTerm.textContent = q;

    listEl.innerHTML = rows.map(r => {
      const domain = domainOf(r.url);
      const pct = Math.round(r.probability * 100);
      const href = r.url || r.hn_link;
      return `
        <div class="row">
          <div class="points">${r.points}<span>pts</span></div>
          <div class="content">
            <a class="title-link" href="${href}" target="_blank" rel="noopener noreferrer">${escapeHtml(r.title)}</a>
            <div class="meta">
              ${domain ? `<span>${escapeHtml(domain)}</span>` : ""}
              <span>by ${escapeHtml(r.author || "")}</span>
              <span>${timeAgo(r.created_at)}</span>
              <a href="${r.hn_link}" target="_blank" rel="noopener noreferrer">${r.num_comments} comments</a>
            </div>
          </div>
          <div class="ai">
            <div class="ai-pct">${pct}%</div>
            <div class="ai-bar-track"><div class="ai-bar-fill" style="width:${pct}%"></div></div>
          </div>
          <div class="summary-col">
            ${r.summary ? `<button class="summary-toggle" type="button" data-hn-link="${escapeHtml(r.hn_link)}">Show summary</button>` : ""}
          </div>
        </div>`;
    }).join("");

    applyDefaultSummarySelection();
  }

  function escapeHtml(s) {
    return s.replace(/[&<>"']/g, c => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
    }[c]));
  }

  function renderSummary(text) {
    return text
      .split(/\n\s*\n/)
      .map(p => `<p>${escapeHtml(p.trim())}</p>`)
      .join("");
  }

  const summaryEmptyEl = document.getElementById("summary-card-empty");
  const summaryContentEl = document.getElementById("summary-card-content");
  const summaryTitleEl = document.getElementById("summary-card-title");
  const summaryBodyEl = document.getElementById("summary-card-body");
  const summaryLinkEl = document.getElementById("summary-card-link");
  let selectedHnLink = null;

  function displaySummary(hnLink, btn) {
    const post = DATA.find(d => d.hn_link === hnLink);
    if (!post || !post.summary) return;

    summaryTitleEl.textContent = post.title;
    summaryBodyEl.innerHTML = renderSummary(post.summary);
    summaryLinkEl.href = post.hn_link;
    summaryEmptyEl.hidden = true;
    summaryContentEl.hidden = false;

    document.querySelectorAll(".summary-toggle.active").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
  }

  // Keep the panel showing a summary whenever one is available: the
  // user's manually selected post if it's still in view, otherwise the
  // first post (in current sort/filter order) that has a summary.
  function applyDefaultSummarySelection() {
    const btns = Array.from(listEl.querySelectorAll(".summary-toggle"));
    if (!btns.length) {
      summaryEmptyEl.hidden = false;
      summaryContentEl.hidden = true;
      return;
    }
    const target = btns.find(b => b.dataset.hnLink === selectedHnLink) || btns[0];
    selectedHnLink = target.dataset.hnLink;
    displaySummary(selectedHnLink, target);
  }

  sortBtns.forEach(btn => {
    btn.addEventListener("click", () => {
      sortKey = btn.dataset.key;
      sortBtns.forEach(b => b.setAttribute("aria-pressed", b === btn ? "true" : "false"));
      render();
    });
  });

  dateBtns.forEach(btn => {
    btn.addEventListener("click", () => {
      dateRange = btn.dataset.range;
      dateBtns.forEach(b => b.setAttribute("aria-pressed", b === btn ? "true" : "false"));
      render();
    });
  });

  searchEl.addEventListener("input", () => {
    query = searchEl.value;
    render();
  });

  listEl.addEventListener("click", (e) => {
    const btn = e.target.closest(".summary-toggle");
    if (!btn) return;
    selectedHnLink = btn.dataset.hnLink;
    displaySummary(selectedHnLink, btn);
    summaryContentEl.closest(".summary-card").scrollIntoView({ behavior: "smooth", block: "nearest" });
  });

  render();
</script>

</body>
</html>
