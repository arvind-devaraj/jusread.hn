<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HN Tech Digest</title>
</head>
<body>

<style>
  :root {
    --bg: #faf7f1;
    --surface: #ffffff;
    --ink: #241f1a;
    --ink-soft: #6b6153;
    --border: #e6ddc9;
    --accent: #c65d1e;
    --accent-soft: #f3e3cf;
    --track: #ece2cc;
    --font-display: Georgia, "Iowan Old Style", "Times New Roman", serif;
    --font-body: -apple-system, "Segoe UI", Helvetica, Arial, sans-serif;
    --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #16130f;
      --surface: #201b14;
      --ink: #f1ead9;
      --ink-soft: #ab9d84;
      --border: #392f22;
      --accent: #e2874a;
      --accent-soft: #40301f;
      --track: #2c2419;
    }
  }
  :root[data-theme="dark"] {
    --bg: #16130f;
    --surface: #201b14;
    --ink: #f1ead9;
    --ink-soft: #ab9d84;
    --border: #392f22;
    --accent: #e2874a;
    --accent-soft: #40301f;
    --track: #2c2419;
  }
  :root[data-theme="light"] {
    --bg: #faf7f1;
    --surface: #ffffff;
    --ink: #241f1a;
    --ink-soft: #6b6153;
    --border: #e6ddc9;
    --accent: #c65d1e;
    --accent-soft: #f3e3cf;
    --track: #ece2cc;
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: var(--font-body);
  }
  body {
    padding: 2.5rem 1.25rem 5rem;
  }
  .page {
    max-width: 780px;
    margin: 0 auto;
  }

  .eyebrow {
    font-family: var(--font-mono);
    font-size: 0.72rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 600;
  }
  h1 {
    font-family: var(--font-display);
    font-size: clamp(2rem, 5vw, 2.75rem);
    margin: 0.35rem 0 0.6rem;
    text-wrap: balance;
    font-weight: 500;
  }
  .stats {
    display: flex;
    flex-wrap: wrap;
    gap: 1.5rem;
    color: var(--ink-soft);
    font-size: 0.92rem;
    padding-bottom: 1.6rem;
    border-bottom: 1px solid var(--border);
    margin-bottom: 1.4rem;
  }
  .stats strong {
    font-family: var(--font-mono);
    font-variant-numeric: tabular-nums;
    color: var(--ink);
    font-weight: 600;
  }

  .toolbar {
    position: sticky;
    top: 0;
    background: var(--bg);
    padding: 0.75rem 0;
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    align-items: center;
    z-index: 5;
    border-bottom: 1px solid var(--border);
    margin-bottom: 0.25rem;
  }
  #search {
    flex: 1 1 180px;
    min-width: 140px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--ink);
    padding: 0.5rem 0.7rem;
    font-family: var(--font-body);
    font-size: 0.9rem;
  }
  #search:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 1px;
  }
  #category-filter {
    flex: 0 1 200px;
    min-width: 160px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--ink);
    padding: 0.5rem 0.6rem;
    font-family: var(--font-body);
    font-size: 0.85rem;
  }
  #category-filter:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 1px;
  }
  .sort-group {
    display: flex;
    gap: 0.35rem;
  }
  .sort-btn {
    font-family: var(--font-mono);
    font-size: 0.78rem;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--ink-soft);
    border-radius: 7px;
    padding: 0.45rem 0.65rem;
    cursor: pointer;
    letter-spacing: 0.02em;
  }
  .sort-btn:hover { color: var(--ink); }
  .sort-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; }
  .sort-btn[aria-pressed="true"] {
    background: var(--accent-soft);
    border-color: var(--accent);
    color: var(--ink);
  }
  .sort-btn .arrow { opacity: 0.6; margin-left: 0.15rem; }

  #count-line {
    color: var(--ink-soft);
    font-size: 0.82rem;
    margin: 0.6rem 0 0.9rem;
    font-family: var(--font-mono);
  }

  .row {
    display: grid;
    grid-template-columns: 3.4rem 1fr 5.4rem;
    gap: 0.9rem;
    align-items: start;
    padding: 0.85rem 0;
    border-bottom: 1px solid var(--border);
  }
  .row:last-child { border-bottom: none; }

  .points {
    font-family: var(--font-mono);
    font-variant-numeric: tabular-nums;
    font-weight: 700;
    font-size: 1.05rem;
    text-align: right;
    padding-top: 0.1rem;
  }
  .points span {
    display: block;
    font-size: 0.62rem;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--ink-soft);
  }

  .content a.title-link {
    color: var(--ink);
    text-decoration: none;
    font-weight: 600;
    font-size: 0.98rem;
    line-height: 1.35;
  }
  .content a.title-link:hover { color: var(--accent); }
  .content a.title-link:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  .meta {
    margin-top: 0.3rem;
    font-size: 0.78rem;
    color: var(--ink-soft);
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    font-family: var(--font-mono);
  }
  .meta a {
    color: var(--ink-soft);
    text-decoration: none;
    border-bottom: 1px dotted var(--border);
  }
  .meta a:hover { color: var(--accent); border-color: var(--accent); }

  .category-badge {
    display: inline-block;
    font-family: var(--font-mono);
    font-size: 0.68rem;
    font-weight: 600;
    letter-spacing: 0.02em;
    color: var(--accent);
    background: var(--accent-soft);
    border-radius: 999px;
    padding: 0.12rem 0.55rem;
  }

  .tech {
    text-align: right;
  }
  .tech-pct {
    font-family: var(--font-mono);
    font-variant-numeric: tabular-nums;
    font-size: 0.82rem;
    font-weight: 600;
    color: var(--ink-soft);
  }
  .tech-bar-track {
    margin-top: 0.35rem;
    height: 5px;
    border-radius: 3px;
    background: var(--track);
    overflow: hidden;
  }
  .tech-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 3px;
  }

  #empty {
    display: none;
    text-align: center;
    color: var(--ink-soft);
    padding: 3rem 0;
    font-family: var(--font-mono);
    font-size: 0.85rem;
  }

  @media (max-width: 480px) {
    .row { grid-template-columns: 2.6rem 1fr 3.6rem; gap: 0.6rem; }
  }
</style>

<div class="page">
  <div class="eyebrow">Hacker News &middot; past 30 days</div>
  <h1>Tech Digest</h1>
  <div class="stats">
    <div><strong id="stat-count">__STAT_COUNT__</strong> posts</div>
    <div><strong>__STAT_POINTS__</strong> combined points</div>
    <div><strong>__STAT_AVG_TECH__</strong> avg. tech confidence</div>
    <div>filtered &ge; 60% tech probability</div>
  </div>

  <div class="toolbar">
    <input id="search" type="text" placeholder="Filter by title or author&hellip;" aria-label="Filter posts" />
    <select id="category-filter" aria-label="Filter by category">
      <option value="">All categories</option>
    </select>
    <div class="sort-group" role="group" aria-label="Sort posts">
      <button class="sort-btn" data-key="points" aria-pressed="true">Points <span class="arrow">&#8595;</span></button>
      <button class="sort-btn" data-key="num_comments" aria-pressed="false">Comments</button>
      <button class="sort-btn" data-key="probability" aria-pressed="false">Tech %</button>
    </div>
  </div>
  <div id="count-line"></div>

  <div id="list"></div>
  <div id="empty">No posts match &ldquo;<span id="empty-term"></span>&rdquo;</div>
</div>

<script>
  const DATA = __DATA__;

  const listEl = document.getElementById("list");
  const countLine = document.getElementById("count-line");
  const emptyEl = document.getElementById("empty");
  const emptyTerm = document.getElementById("empty-term");
  const searchEl = document.getElementById("search");
  const categoryFilterEl = document.getElementById("category-filter");
  const sortBtns = Array.from(document.querySelectorAll(".sort-btn"));

  let sortKey = "points";
  let query = "";
  let categoryFilter = "";

  Array.from(new Set(DATA.map(r => r.category).filter(Boolean)))
    .sort()
    .forEach(cat => {
      const opt = document.createElement("option");
      opt.value = cat;
      opt.textContent = cat;
      categoryFilterEl.appendChild(opt);
    });

  function domainOf(url) {
    if (!url) return null;
    try {
      return new URL(url).hostname.replace(/^www\./, "");
    } catch (e) {
      return null;
    }
  }

  function timeAgo(iso) {
    const then = new Date(iso).getTime();
    const now = Date.now();
    const hrs = Math.max(1, Math.round((now - then) / 3.6e6));
    if (hrs < 24) return hrs + "h ago";
    return Math.round(hrs / 24) + "d ago";
  }

  function render() {
    const q = query.trim().toLowerCase();
    let rows = DATA.filter(r =>
      (!q || r.title.toLowerCase().includes(q) || (r.author || "").toLowerCase().includes(q)) &&
      (!categoryFilter || r.category === categoryFilter)
    );
    rows = rows.slice().sort((a, b) => b[sortKey] - a[sortKey]);

    countLine.textContent = q
      ? `Showing ${rows.length} of ${DATA.length} posts`
      : `Showing all ${rows.length} posts`;

    emptyEl.style.display = rows.length ? "none" : "block";
    emptyTerm.textContent = q;

    listEl.innerHTML = rows.map(r => {
      const domain = domainOf(r.url);
      const pct = Math.round(r.probability * 100);
      const href = r.url || r.hn_link;
      return `
        <div class="row">
          <div class="points">${r.points}<span>pts</span></div>
          <div class="content">
            <a class="title-link" href="${href}" target="_blank" rel="noopener noreferrer">${escapeHtml(r.title)}</a>
            <div class="meta">
              ${r.category ? `<span class="category-badge">${escapeHtml(r.category)}</span>` : ""}
              ${domain ? `<span>${escapeHtml(domain)}</span>` : ""}
              <span>by ${escapeHtml(r.author || "")}</span>
              <span>${timeAgo(r.created_at)}</span>
              <a href="${r.hn_link}" target="_blank" rel="noopener noreferrer">${r.num_comments} comments</a>
            </div>
          </div>
          <div class="tech">
            <div class="tech-pct">${pct}%</div>
            <div class="tech-bar-track"><div class="tech-bar-fill" style="width:${pct}%"></div></div>
          </div>
        </div>`;
    }).join("");
  }

  function escapeHtml(s) {
    return s.replace(/[&<>"']/g, c => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
    }[c]));
  }

  sortBtns.forEach(btn => {
    btn.addEventListener("click", () => {
      sortKey = btn.dataset.key;
      sortBtns.forEach(b => b.setAttribute("aria-pressed", b === btn ? "true" : "false"));
      render();
    });
  });

  searchEl.addEventListener("input", () => {
    query = searchEl.value;
    render();
  });

  categoryFilterEl.addEventListener("change", () => {
    categoryFilter = categoryFilterEl.value;
    render();
  });

  render();
</script>

</body>
</html>
